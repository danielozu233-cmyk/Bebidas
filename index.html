<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <link rel="icon" href="favicon.ico">
    <title>Bebidas Preparadas</title>
    <style>
        :root {
            --bg-main: #f8fafc;
            /* Fondo claro y limpio */
            --bg-card: #ffffff;
            /* Tarjetas totalmente blancas */
            --primary-color: #0f172a;
            /* Gris pizarra oscuro para textos principales y botones */
            --accent-color: #2563eb;
            /* Azul eléctrico moderno para destacar elementos pro */
            --text-main: #334155;
            /* Texto de lectura */
            --text-muted: #64748b;
            /* Subtítulos y descripciones */
            --border-color: #e2e8f0;
            /* Líneas divisorias suaves */
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background-color: var(--bg-main);
            color: var(--text-main);
            min-height: 100vh;
            padding-bottom: 100px;
        }

        header {
            padding: 40px 20px 30px;
            text-align: center;
            background: #ffffff;
            position: sticky;
            top: 0;
            z-index: 10;
            border-bottom: 1px solid var(--border-color);
        }

        header h1 {
            font-size: 1.6rem;
            font-weight: 800;
            letter-spacing: -0.5px;
            color: var(--primary-color);
            text-transform: uppercase;
        }

        header p {
            font-size: 0.9rem;
            color: var(--text-muted);
            margin-top: 6px;
            font-weight: 500;
        }

        .alert-banner {
            background: #fffbeb;
            color: #b45309;
            padding: 8px 16px;
            border-radius: 30px;
            font-size: 0.8rem;
            margin-top: 14px;
            display: inline-block;
            border: 1px solid #fef3c7;
            font-weight: 600;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            /* Fuerza 2 columnas fijas */
            gap: 12px;
            /* Reducimos un poco el espacio para que cuadre perfecto en pantallas pequeñas */
            padding: 12px;
            max-width: 600px;
            /* Al ser de 2 en 2, limitamos el ancho máximo para que no se estire de más */
            margin: 0 auto;
        }

        .card {
            background: var(--bg-card);
            border-radius: 16px;
            border: 1px solid var(--border-color);
            overflow: hidden;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05), 0 2px 4px -1px rgba(0, 0, 0, 0.03);
            display: flex;
            flex-direction: column;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }

        .card:active {
            transform: scale(0.98);
        }

.card img {
            width: 100%;
            height: 220px; /* Aumentamos la altura de 140px a 220px */
            object-fit: cover;
            background-color: #f1f5f9;
        }
        .info {
            padding: 14px;
            display: flex;
            flex-direction: column;
            flex-grow: 1;
        }

        .info h3 {
            font-size: 0.95rem;
            font-weight: 700;
            color: var(--primary-color);
            margin-bottom: 4px;
            line-height: 1.2;
        }

        .info .desc {
            font-size: 0.8rem;
            color: var(--text-muted);
            line-height: 1.4;
            margin-bottom: 12px;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .price-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: auto;
            padding-top: 4px;
        }

        .price {
            color: var(--primary-color);
            font-weight: 800;
            font-size: 1.05rem;
        }

        .btn-add-icon {
            background: var(--primary-color);
            color: white;
            width: 32px;
            height: 32px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 600;
            font-size: 1.1rem;
            border: none;
            cursor: pointer;
            transition: background 0.2s;
        }

        .btn-add-icon:hover {
            background: var(--accent-color);
        }

        /* Botón flotante del Carrito Moderno */
        .cart-btn {
            position: fixed;
            bottom: 24px;
            right: 24px;
            background: var(--primary-color);
            color: white;
            padding: 14px 20px;
            border-radius: 50px;
            font-weight: 700;
            font-size: 1rem;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -2px rgba(0, 0, 0, 0.05);
            z-index: 20;
            display: flex;
            align-items: center;
            gap: 8px;
            border: none;
            cursor: pointer;
        }

        .cart-badge {
            background: var(--accent-color);
            color: white;
            padding: 2px 8px;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: 700;
        }

        /* Modales Estilo Claro y Profesional */
        .modal {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(15, 23, 42, 0.4);
            backdrop-filter: blur(4px);
            -webkit-backdrop-filter: blur(4px);
            z-index: 30;
            align-items: flex-end;
        }

        @media (min-width: 600px) {
            .modal {
                align-items: center;
                justify-content: center;
            }
        }

        .modal-content {
            background: #ffffff;
            width: 100%;
            max-height: 85vh;
            overflow-y: auto;
            border-radius: 24px 24px 0 0;
            padding: 24px;
            box-shadow: 0 -10px 25px -5px rgba(0, 0, 0, 0.1);
            animation: slideUp 0.2s cubic-bezier(0.16, 1, 0.3, 1);
        }

        @media (min-width: 600px) {
            .modal-content {
                max-width: 450px;
                border-radius: 20px;
                box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1);
            }
        }

        @keyframes slideUp {
            from {
                transform: translateY(100%);
            }

            to {
                transform: translateY(0);
            }
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            padding-bottom: 10px;
            border-bottom: 1px solid var(--border-color);
        }

        .modal-header h2 {
            font-size: 1.2rem;
            font-weight: 700;
            color: var(--primary-color);
        }

        .close-btn {
            background: #f1f5f9;
            color: var(--text-muted);
            font-size: 1.4rem;
            width: 32px;
            height: 32px;
            border-radius: 50%;
            border: none;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
        }

        /* Opciones de Variantes */
        .variant-option {
            background: #f8fafc;
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 16px;
            margin-bottom: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .variant-option:active {
            background: #eff6ff;
            border-color: var(--accent-color);
        }

        .variant-name {
            font-weight: 600;
            font-size: 0.95rem;
            color: var(--text-main);
        }

        .variant-price {
            color: var(--accent-color);
            font-weight: 700;
        }

        /* Elementos del Carrito */
        .cart-items-container {
            max-height: 220px;
            overflow-y: auto;
            margin-bottom: 15px;
            padding-right: 4px;
        }

        .line {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 0;
            border-bottom: 1px solid var(--border-color);
        }

        .line-qty {
            color: var(--accent-color);
            font-weight: 700;
            font-size: 0.9rem;
            margin-right: 8px;
        }

        .line-remove {
            background: transparent;
            color: #ef4444;
            border: none;
            font-size: 1.1rem;
            margin-left: 12px;
            padding: 4px;
            cursor: pointer;
        }

        .total-section {
            display: flex;
            justify-content: space-between;
            font-size: 1.2rem;
            font-weight: 800;
            margin: 20px 0;
            color: var(--primary-color);
            padding-top: 10px;
            border-top: 2px dashed var(--border-color);
        }

        /* Inputs y Selects */
        input,
        select,
        textarea {
            width: 100%;
            padding: 12px 14px;
            margin: 6px 0 14px;
            border-radius: 10px;
            border: 1px solid var(--border-color);
            background: #f8fafc;
            color: var(--text-main);
            font-size: 0.9rem;
            outline: none;
            transition: border-color 0.2s;
        }

        input:focus,
        select:focus,
        textarea:focus {
            border-color: var(--accent-color);
            background: #ffffff;
        }

        input::placeholder,
        textarea::placeholder {
            color: #94a3b8;
        }

        /* Botón de Envío */
        .btn-submit {
            width: 100%;
            background: var(--accent-color);
            color: white;
            font-weight: 700;
            font-size: 1rem;
            padding: 14px;
            border-radius: 10px;
            border: none;
            box-shadow: 0 4px 6px -1px rgba(37, 99, 235, 0.2);
            margin-top: 10px;
            cursor: pointer;
            transition: background 0.2s;
        }

        .btn-submit:active {
            transform: scale(0.99);
        }

        .loading {
            grid-column: 1 / -1;
            text-align: center;
            padding: 40px;
            color: var(--text-muted);
            font-weight: 600;
            font-size: 1.1rem;
        }

        .tracking-btn {
            position: fixed;
            bottom: 24px;
            left: 24px;
            background: #2563eb;
            color: white;
            border: none;
            border-radius: 50px;
            padding: 14px 20px;
            font-weight: 700;
            cursor: pointer;
            z-index: 20;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, .1);
        }

        .tracking-card {
            background: #fff;
            border-radius: 16px;
            padding: 18px;
            border: 1px solid #e2e8f0;
            box-shadow: 0 4px 12px rgba(0, 0, 0, .08);
        }

        .estado-badge {
            display: inline-block;
            padding: 8px 16px;
            border-radius: 999px;
            color: white;
            font-weight: bold;
            margin: 10px 0;
        }

        .estado-pendiente {
            background: #f59e0b;
        }

        .estado-preparando {
            background: #8b5cf6;
        }

        .estado-camino {
            background: #2563eb;
        }

        .estado-entregado {
            background: #22c55e;
        }

        .logo img {
            width: 80px;
            height: 80px;

        }
    </style>
</head>

<body>

    <header>
        <div class="logo">
            <p>¡Tu bebida favorita, al alcance de un clic!</p>
            <div class="alert-banner">Almería y Navarra requieren mínimo 2 bebidas</div>
    </header>

    <div class="grid" id="products">
        <div class="loading">Cargando menú...</div>
    </div>

    <button class="cart-btn" onclick="openCart()">
        🛒 <span class="cart-badge" id="count">0</span>
    </button>
    <button class="tracking-btn" onclick="openTrackingModal()">
        📦 Rastrear Pedido
    </button>
    <div class="modal" id="variantModal">
        <div class="modal-content">
            <div class="modal-header">
                <h2 id="variantTitle">Selecciona tu opción</h2>
                <button class="close-btn" onclick="closeVariantModal()">×</button>
            </div>
            <div id="variantOptions"></div>
        </div>
    </div>

    <div class="modal" id="cartModal">
        <div class="modal-content">
            <div class="modal-header">
                <h2>Tu Pedido</h2>
                <button class="close-btn" onclick="closeCart()">×</button>
            </div>

            <div class="cart-items-container" id="cartItems"></div>

            <div class="total-section">
                <span>Total:</span>
                <span>Q<span id="total">0</span></span>
            </div>

            <input type="text" id="nombre" placeholder="Nombre">
            <textarea id="direccion" placeholder="Número de Casa (Ej. Manzana X, Casa Y)"></textarea>
            <input type="text" id="codigo" placeholder="Código de acceso (Opcional)">

            <select id="residencial">
                <option value="" disabled selected>Selecciona tu residencial...</option>
                <option value="Almería">Almería</option>
                <option value="Navarra">Navarra</option>
                <option value="Condado Florenza">Condado Florenza</option>
            </select>

            <select id="pago">
                <option value="" disabled selected>Método de pago...</option>
                <option value="Efectivo">Efectivo</option>
                <option value="Transferencia">Transferencia</option>
            </select>

            <button class="btn-submit" onclick="confirmarPedido()">Confirmar por WhatsApp</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        // Agregamos addDoc y serverTimestamp a las importaciones
        import {
            getFirestore,
            collection,
            onSnapshot,
            addDoc,
            serverTimestamp,
            query,
            where,
            getDocs
        }
            from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
        const firebaseConfig = {
            apiKey: "AIzaSyCi2cMCDPj6UTMJTDiNQsNmUDjRB8xCkiM",
            authDomain: "bebidaspreparada.firebaseapp.com",
            projectId: "bebidaspreparada",
            storageBucket: "bebidaspreparada.firebasestorage.app",
            messagingSenderId: "762147100060",
            appId: "1:762147100060:web:e50316cf83aec23a3da459",
            measurementId: "G-5S0BVLHLJL"
        };

        // Inicialización de Firebase
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // Arreglo dinámico que se llenará desde la base de datos
        let productos = [];
        let carrito = [];
        let productoSeleccionadoIndex = null;

// ESCUCHAR LA BASE DE DATOS EN TIEMPO REAL
        onSnapshot(collection(db, "productos"), (snapshot) => {
            productos = [];
            snapshot.forEach((doc) => {
                const data = doc.data();
                if (data.disponible === true) {
                    productos.push({ id: doc.id, ...data });
                }
            });

            // --- NUEVO CÓDIGO: ORDENAR PRODUCTOS ---
            productos.sort((a, b) => {
                // Convertimos el nombre a minúsculas para buscar la palabra sin importar cómo se escribió
                const nombreA = a.name ? a.name.toLowerCase() : "";
                const nombreB = b.name ? b.name.toLowerCase() : "";
                
                const esCervezaA = nombreA.includes('cerveza');
                const esCervezaB = nombreB.includes('cerveza');

                if (esCervezaA && !esCervezaB) {
                    return 1;  // 'a' es cerveza, se va hacia el final
                }
                if (!esCervezaA && esCervezaB) {
                    return -1; // 'b' es cerveza, se va hacia el final
                }
                return 0; // Si ambas lo son, o ninguna lo es, se quedan en su orden normal
            });
            // ---------------------------------------

            render();
        });

        function render() {
            const c = document.getElementById('products');
            c.innerHTML = '';

            if (productos.length === 0) {
                c.innerHTML = '<div class="loading">Menú no disponible por el momento.</div>';
                return;
            }

            productos.forEach((p, i) => {
                let precioTexto = "";
                if (p.hasVariants && p.variants && p.variants.length > 0) {
                    const precioMinimo = Math.min(...p.variants.map(v => v.precio));
                    precioTexto = `Desde Q${precioMinimo}`;
                } else {
                    precioTexto = `Q${p.precio}`;
                }

                c.innerHTML += `
            <div class="card">
                <img src="${p.img}" alt="${p.name}">
                <div class="info">
                    <h3>${p.name}</h3>
                    <p class="desc">${p.desc}</p>
                    <div class="price-row">
                        <div class="price">${precioTexto}</div>
                        <button class="btn-add-icon" onclick="agregar(${i})">+</button>
                    </div>
                </div>
            </div>`;
            });
        }

        function agregar(i) {
            const producto = productos[i];
            if (producto.hasVariants && producto.variants) {
                productoSeleccionadoIndex = i;
                document.getElementById('variantTitle').textContent = `Opciones para ${producto.name}`;
                const container = document.getElementById('variantOptions');
                container.innerHTML = '';

                producto.variants.forEach((v, vIdx) => {
                    container.innerHTML += `
                <div class="variant-option" onclick="agregarConVariante(${vIdx})">
                    <span class="variant-name">${v.name}</span>
                    <span class="variant-price">Q${v.precio}</span>
                </div>`;
                });
                document.getElementById('variantModal').style.display = 'flex';
            } else {
                agregarAlCarrito(producto.name, producto.precio);
            }
        }

        function agregarConVariante(vIdx) {
            const producto = productos[productoSeleccionadoIndex];
            const variante = producto.variants[vIdx];
            const nombreCompleto = `${producto.name} (${variante.name})`;

            agregarAlCarrito(nombreCompleto, variante.precio);
            closeVariantModal();
        }

        function agregarAlCarrito(nombre, precio) {
            const itemExistente = carrito.find(item => item.name === nombre);
            if (itemExistente) {
                itemExistente.cantidad++;
            } else {
                carrito.push({ name: nombre, precio: precio, cantidad: 1 });
            }
            actualizarContador();
        }

        function eliminar(index) {
            carrito.splice(index, 1);
            actualizarContador();
            renderCart();
        }

        function actualizarContador() {
            const totalItems = carrito.reduce((sum, item) => sum + item.cantidad, 0);
            document.getElementById('count').textContent = totalItems;
        }

        function openCart() {
            document.getElementById('cartModal').style.display = 'flex';
            renderCart();
        }

        function closeCart() {
            document.getElementById('cartModal').style.display = 'none';
        }

        function closeVariantModal() {
            document.getElementById('variantModal').style.display = 'none';
            productoSeleccionadoIndex = null;
        }

        function renderCart() {
            let html = '';
            let total = 0;
            carrito.forEach((p, index) => {
                const subtotal = p.precio * p.cantidad;
                html += `
            <div class="line">
                <div>
                    <span class="line-qty">${p.cantidad}x</span>
                    <span>${p.name}</span>
                </div>
                <div>
                    <span>Q${subtotal}</span>
                    <button class="line-remove" onclick="eliminar(${index})">🗑️</button>
                </div>
            </div>`;
                total += subtotal;
            });
            document.getElementById('cartItems').innerHTML = html || '<p style="text-align:center; color:#94a3b8; padding: 20px 0;">Tu carrito está vacío</p>';
            document.getElementById('total').textContent = total;
        }

        // Convertimos la función en asíncrona para poder interactuar con Firebase antes de ir a WhatsApp
        async function confirmarPedido() {
            const totalBebidas = carrito.reduce((sum, item) => sum + item.cantidad, 0);

            if (totalBebidas === 0) {
                alert('Por favor, agrega al menos una bebida a tu pedido.');
                return;
            }

            const residencial = document.getElementById('residencial').value;
            if ((residencial === 'Almería' || residencial === 'Navarra') && totalBebidas < 2) {
                alert('Para ' + residencial + ' requerimos un pedido mínimo de 2 bebidas.');
                return;
            }

            const nombre = document.getElementById('nombre').value.trim();
            const direccion = document.getElementById('direccion').value.trim();
            const codigo = document.getElementById('codigo').value.trim() || 'N/A';
            const pago = document.getElementById('pago').value;

            if (!nombre || !direccion || !residencial || !pago) {
                alert('Por favor, completa todos los campos del formulario.');
                return;
            }

            const btnSubmit = document.querySelector('.btn-submit');
            btnSubmit.disabled = true;
            btnSubmit.textContent = "Procesando...";

            // 1. Generar el número ANTES de guardar
            const numeroPedido = Math.floor(10000 + Math.random() * 90000).toString();

            let total = 0;
            carrito.forEach(p => { total += p.precio * p.cantidad; });

            const datosPedido = {
                numero: numeroPedido,
                cliente: nombre,
                direccion: direccion,
                codigoAcceso: codigo,
                residencial: residencial,
                metodoPago: pago,
                productos: carrito,
                total: total,
                estado: "Pendiente",
                fecha: serverTimestamp()
            };

            try {
                // 2. Guardar en Firebase
                await addDoc(collection(db, "pedidos"), datosPedido);
                localStorage.setItem(
                    "ultimoPedido",
                    numeroPedido
                );
                // 3. Crear el mensaje usando el número generado directamente aquí
                const msg = `Hola, he realizado el pedido No. *${numeroPedido}*.%0A%0A*`;

                // 4. Abrir WhatsApp
                window.open(`https://wa.me/50246577219?text=${msg}`, '_blank');

                // Limpieza
                carrito = [];
                actualizarContador();
                closeCart();
                // (Opcional) alert(`Tu número de pedido es ${numeroPedido}`);

            } catch (error) {
                console.error("Error:", error);
                alert("Hubo un error al procesar el pedido.");
            } finally {
                btnSubmit.disabled = false;
                btnSubmit.textContent = "Confirmar por WhatsApp";
            }
        }
        function openTrackingModal() {

            document.getElementById('trackingModal')
                .style.display = 'flex';

            const ultimoPedido =
                localStorage.getItem('ultimoPedido');

            if (ultimoPedido) {
                document.getElementById(
                    'numeroPedidoBusqueda'
                ).value = ultimoPedido;
            }
        }

        function closeTrackingModal() {
            document.getElementById('trackingModal').style.display = 'none';
        }
        async function buscarPedido() {

            const numero =
                document.getElementById('numeroPedidoBusqueda')
                    .value.trim();

            if (!numero) {
                alert('Ingresa tu número de pedido');
                return;
            }

            const resultado =
                document.getElementById('resultadoPedido');

            resultado.innerHTML = 'Buscando...';

            const q = query(
                collection(db, "pedidos"),
                where("numero", "==", numero)
            );

            const snap = await getDocs(q);

            if (snap.empty) {
                resultado.innerHTML =
                    '<p>Pedido no encontrado.</p>';
                return;
            }

            const pedido = snap.docs[0].data();

            let productosHtml = '';

            pedido.productos.forEach(p => {
                productosHtml += `
            <li>
                ${p.cantidad}x ${p.name}
            </li>
        `;
            });

            let claseEstado = "estado-pendiente";

            if (pedido.estado === "Preparando") {
                claseEstado = "estado-preparando";
            }

            if (pedido.estado === "En camino") {
                claseEstado = "estado-camino";
            }

            if (pedido.estado === "Entregado") {
                claseEstado = "estado-entregado";
            }

            resultado.innerHTML = `
<div class="tracking-card">

<h3>📦 Pedido #${pedido.numero}</h3>

<div class="estado-badge ${claseEstado}">
${pedido.estado}
</div>

<p><strong>Cliente:</strong> ${pedido.cliente}</p>

<p><strong>Total:</strong> Q${pedido.total}</p>

<h4>Productos:</h4>

<ul>
${productosHtml}
</ul>

</div>
`;
        }
        // Vinculación de funciones a la ventana global
        window.agregar = agregar;
        window.agregarConVariante = agregarConVariante;
        window.eliminar = eliminar;
        window.openCart = openCart;
        window.closeCart = closeCart;
        window.closeVariantModal = closeVariantModal;
        window.confirmarPedido = confirmarPedido;
        window.openTrackingModal = openTrackingModal;
        window.closeTrackingModal = closeTrackingModal;
        window.buscarPedido = buscarPedido;
        // Evento para cerrar modales al hacer clic fuera de ellos
        window.addEventListener('click', function (e) {
            const cartModal = document.getElementById('cartModal');
            const variantModal = document.getElementById('variantModal');
            if (e.target === cartModal) closeCart();
            if (e.target === variantModal) closeVariantModal();
        });
    </script>
    <div class="modal" id="trackingModal">
        <div class="modal-content">

            <div class="modal-header">
                <h2>Rastrear Pedido</h2>
                <button class="close-btn" onclick="closeTrackingModal()">×</button>
            </div>

            <input type="text" id="numeroPedidoBusqueda" placeholder="Número de pedido">

            <button class="btn-submit" onclick="buscarPedido()">
                Buscar Pedido
            </button>

            <div id="resultadoPedido" style="margin-top:20px;"></div>

        </div>
    </div>
</body>

</html>
